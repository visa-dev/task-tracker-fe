name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Check
        env:
          # Only for CI build verification
          VITE_API_BASE_URL: http://localhost:8080
          VITE_WS_URL: ws://localhost:8080/ws
        run: npm run build