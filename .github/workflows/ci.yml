name: Frontend CI (Production Ready)

on:
  push:
    branches: ['main']
  pull_request:

jobs:
  ci:
    name: Lint + Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build (CI verification only)
        env:
          VITE_API_BASE_URL: http://localhost:8080
          VITE_WS_URL: ws://localhost:8080/ws
        run: npm run build